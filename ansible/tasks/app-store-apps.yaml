- name: Install apps from App Store
  ansible.builtin.command: brew bundle --file "{{ playbook_dir }}/Brewfile.app-store"
  environment: "{{ homebrew_environment }}"
  register: brew_bundle_app_store
  changed_when: >-
    'Installing' in brew_bundle_app_store.stdout or
    'Upgrading' in brew_bundle_app_store.stdout or
    'Tapping' in brew_bundle_app_store.stdout
  # Retry once: brew's post-install auto-cleanup can hit a transient
  # filesystem race that exits non-zero despite a successful install.
  until: brew_bundle_app_store.rc == 0
  retries: 1
  delay: 5
  ignore_errors: true
  tags:
    - app-store
    - install
