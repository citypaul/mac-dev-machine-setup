- name: Install CLI packages
  community.general.homebrew:
    name: "{{ item }}"
    state: latest
  ignore_errors: yes
  with_items:
    # Core Tools
    - git
    - worktrunk
    - curl
    - wget
    - tree
    - stow
    # Shell & Navigation
    - zellij
    - fzf
    - z
    - starship
    - thefuck
    # Development Tools
    - gh
    - lazygit
    - ripgrep
    - fd
    - jq
    - httpie
    - claude
    # Package Managers
    - yarn
    - pnpm
    - nvm
    - pipx
    - mas
    # Infrastructure & Cloud
    - ansible
    - terraform
    - mole
    # Database
    - mysql-client
    - pscale
    # Languages & Runtimes
    - rust
    - deno
    - go
    # Build Tools
    - cmake
    # System Monitoring
    - glances
    - tldr
    # Utilities
    - aria2
    - asciinema
    - eza
    - bat
    - axe
    # Apple Development
    - robotsandpencils/made/xcodes
    - hammerspoon
    - xcode-build-server
    - xcbeautify
    - swiftformat
    - swift-format
  tags:
    - install
    - productivity
    - cli

- name: Better fzf shell integration
  ansible.builtin.shell: $(brew --prefix)/opt/fzf/install
  tags:
    - install
    - productivity
    - cli
