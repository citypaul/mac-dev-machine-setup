# Homebrew 6.0+ refuses to load formulae from untrusted third-party taps
# (hashicorp/tap, oven-sh/bun, retlehs/tap, ankitpokhrel/jira-cli) when its
# tap-trust gate is active, which aborts the bundle below. Trust the taps
# first. See brew-trust-taps.yaml for full context.
- name: Trust third-party Homebrew taps before cli package installs
  ansible.builtin.import_tasks: brew-trust-taps.yaml
  tags:
    - install
    - productivity
    - cli

- name: Install CLI packages from Brewfile
  ansible.builtin.command: brew bundle --file "{{ playbook_dir }}/Brewfile.cli"
  environment: "{{ homebrew_environment }}"
  register: brew_bundle_cli
  changed_when: >-
    'Installing' in brew_bundle_cli.stdout or
    'Upgrading' in brew_bundle_cli.stdout or
    'Tapping' in brew_bundle_cli.stdout
  tags:
    - install
    - productivity
    - cli

  # brew's post-install auto-cleanup can hit a transient filesystem race
  # (dir_s_rmdir on an already-removed cache file) that exits non-zero even
  # though every package installed fine. A single retry re-runs against a
  # settled cache and passes in seconds.
  until: brew_bundle_cli.rc == 0
  retries: 1
  delay: 5

# Several CLI packages above (agent-browser, gemini-cli, opencode) pull in the
# unversioned `node` formula as a runtime dependency and re-link
# /opt/homebrew/bin/node → whatever major version brew currently ships
# (Node 25.x at time of writing). Unlink here so nvm's LTS controls the
# active Node version. See brew-unlink-node.yaml for full context.
- name: Unlink Homebrew node after cli package installs
  ansible.builtin.import_tasks: brew-unlink-node.yaml
  tags:
    - install
    - productivity
    - cli

- name: Install agent-browser Chromium
  ansible.builtin.shell: agent-browser install
  args:
    creates: "{{ ansible_env.HOME }}/Library/Caches/ms-playwright"
  tags:
    - install
    - productivity
    - cli

- name: Better fzf shell integration
  ansible.builtin.shell: $(brew --prefix)/opt/fzf/install
  tags:
    - install
    - productivity
    - cli
