- name: Install CLI packages from Brewfile
  ansible.builtin.command: brew bundle install --file "{{ playbook_dir }}/Brewfile.cli"
  environment: "{{ homebrew_environment }}"
  register: brew_bundle_cli
  changed_when: >-
    'Installing' in brew_bundle_cli.stdout or
    'Upgrading' in brew_bundle_cli.stdout or
    'Tapping' in brew_bundle_cli.stdout
  tags:
    - install
    - productivity
    - cli

- name: Install optional CLI packages from Brewfile
  ansible.builtin.command: brew bundle install --file "{{ playbook_dir }}/Brewfile.cli-optional"
  environment: "{{ homebrew_environment }}"
  register: brew_bundle_cli_optional
  changed_when: >-
    'Installing' in brew_bundle_cli_optional.stdout or
    'Upgrading' in brew_bundle_cli_optional.stdout or
    'Tapping' in brew_bundle_cli_optional.stdout
  failed_when: false
  tags:
    - install
    - productivity
    - cli

- name: Report optional CLI package failures
  ansible.builtin.debug:
    msg:
      - "Optional CLI package install failed but setup will continue."
      - "{{ brew_bundle_cli_optional.stderr | default('') }}"
  when: brew_bundle_cli_optional.rc != 0
  tags:
    - install
    - productivity
    - cli

- name: Unlink Homebrew node after CLI package installs
  ansible.builtin.import_tasks: brew-unlink-node.yaml
  tags:
    - install
    - productivity
    - cli

- name: Better fzf shell integration
  ansible.builtin.shell: $(brew --prefix)/opt/fzf/install
  tags:
    - install
    - productivity
    - cli
