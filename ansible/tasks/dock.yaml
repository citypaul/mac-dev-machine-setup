- name: Install dockutil
  community.general.homebrew:
    name: dockutil
    state: present
  environment: "{{ homebrew_environment }}"
  tags:
    - install
    - dock

- name: Check dockutil is available
  ansible.builtin.shell: command -v dockutil
  args:
    executable: /bin/bash
  register: dockutil_check
  changed_when: false
  failed_when: false
  tags:
    - install
    - dock

- name: Report missing dockutil
  ansible.builtin.debug:
    msg: "dockutil is not available; skipping Dock configuration."
  when: dockutil_check.rc != 0
  tags:
    - install
    - dock

- name: Clear dock
  ansible.builtin.command: dockutil --remove all --no-restart
  when: dockutil_check.rc == 0
  tags:
    - install
    - dock

- name: Setup dock
  ansible.builtin.shell: dockutil --add {{ item }} --no-restart
  args:
    executable: /bin/bash
  with_items:
    - /Applications/Home.app
    - "'' --type spacer --section apps --after Home"
    - /Applications/Cursor.app
    - /Applications/Warp.app
    - "'' --type spacer --section apps --after Warp"
    - /Applications/Safari.app
    - "'' --type spacer --section apps --after Arc"
    - /Applications/Drafts.app
    - /Applications/Obsidian.app
    - /Applications/Things.app
    - /Applications/1Password.app
    - "'' --type spacer --section apps --after 1Password"
    - /Applications/Mail.app
    - /Applications/Calendar.app
    - /Applications/Messages.app
    - /Applications/Slack.app
    - /Applications/Discord.app
    - "'' --type spacer --section apps --after Discord"
    - /Applications/Music.app
    - /Applications/Podcasts.app
  register: dock_add_results
  changed_when: dock_add_results.rc == 0
  failed_when: false
  when: dockutil_check.rc == 0
  tags:
    - install
    - dock

- name: Restart dock
  ansible.builtin.command: /usr/bin/killall Dock
  when: dockutil_check.rc == 0
  tags:
    - install
    - dock
