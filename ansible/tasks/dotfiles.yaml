- name: Install stow
  community.general.homebrew:
    name: ["stow"]
  tags:
    - install
    - dotfiles
    - stow
    - cli

- name: Cloning .dotfiles
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: "{{ lookup('env', 'HOME') }}/.dotfiles"
    recursive: yes
    update: yes
    accept_hostkey: yes
    force: yes
    version: "{{ dotfiles_version }}"
  tags:
    - install
    - dotfiles
    - stow
    - cli

- name: Ensure dotfiles backup directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.mac-setup-backups/{{ ansible_date_time.iso8601_basic_short }}/dotfiles"
    state: directory
    mode: "0755"
  when: dotfiles_conflict_paths | default([]) | length > 0
  tags:
    - install
    - dotfiles
    - stow
    - cli

- name: Back up existing dotfile conflicts before stow
  ansible.builtin.shell: |
    set -euo pipefail
    target="{{ ansible_env.HOME }}/{{ item }}"
    backup="{{ ansible_env.HOME }}/.mac-setup-backups/{{ ansible_date_time.iso8601_basic_short }}/dotfiles/{{ item }}"

    if [ -e "$target" ] && [ ! -L "$target" ]; then
      mkdir -p "$(dirname "$backup")"
      mv "$target" "$backup"
      echo "$target -> $backup"
    fi
  args:
    executable: /bin/bash
  loop: "{{ dotfiles_conflict_paths | default([]) }}"
  register: dotfiles_conflict_backup
  changed_when: dotfiles_conflict_backup.stdout != ""
  tags:
    - install
    - dotfiles
    - stow
    - cli

- name: Stow dotfiles
  ansible.builtin.shell: cd "$HOME/.dotfiles" && ./install.sh
  args:
    executable: /bin/bash
  changed_when: true
  tags:
    - install
    - dotfiles
    - stow
    - cli
