- name: Install Apps
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: latest
  ignore_errors: yes
  with_items:
    # Mac Utilities
    - downie
    - cleanshot
    - httpie
    - bettertouchtool
    - raycast
    - lunar
    - gas-mask
    - rectangle-pro
    - alt-tab
    - popclip
    - protonvpn
    - bartender
    - little-snitch
    - micro-snitch
    # Software Development
    - warp
    - cursor
    - 1password-cli
    - tuist
    - codex
    - claude-code
    # App Development
    - rotato
    # Web Development
    - firefox
    - ungoogled-chromium
    # PKM
    - obsidian
    - dropbox
    # Social
    - discord
    - zoom
    - slack
    - camo-studio
    # Design
    - sketch
    # Gaming
    - steelseries-gg
    # Misc
    - vlc
    - hammerspoon
    # Fonts
    - font-fira-code
    - font-hack
    - font-jetbrains-mono
    - font-recursive-code
  tags:
    - install
    - gui
    - productivity
