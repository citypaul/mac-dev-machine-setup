- name: Install personal GUI packages from Brewfile
  ansible.builtin.command: brew bundle install --file "{{ playbook_dir }}/Brewfile.personal"
  environment: "{{ homebrew_environment }}"
  register: brew_bundle_personal
  changed_when: >-
    'Installing' in brew_bundle_personal.stdout or
    'Upgrading' in brew_bundle_personal.stdout or
    'Tapping' in brew_bundle_personal.stdout
  failed_when: false
  when: machine_type == "personal"
  tags:
    - personal
    - gui

- name: Report personal GUI package failures
  ansible.builtin.debug:
    msg:
      - "Personal GUI package install failed but setup will continue."
      - "{{ brew_bundle_personal.stderr | default('') }}"
  when: machine_type == "personal" and brew_bundle_personal.rc != 0
  tags:
    - personal
    - gui

