- name: Read GUI casks from Brewfile
  ansible.builtin.command: brew bundle list --file "{{ playbook_dir }}/Brewfile.gui" --cask
  environment: "{{ homebrew_environment | combine({'HOMEBREW_NO_AUTO_UPDATE': '1'}) }}"
  register: brewfile_gui_casks
  changed_when: false
  tags:
    - install
    - gui
    - productivity

- name: Install GUI casks from Brewfile
  ansible.builtin.shell: |
    set -euo pipefail
    cask="{{ item }}"

    if brew list --cask "$cask" >/dev/null 2>&1; then
      brew upgrade --cask --greedy "$cask"
    else
      brew install --cask --adopt "$cask"
    fi
  args:
    executable: /bin/bash
  environment: "{{ homebrew_environment | combine({'HOMEBREW_NO_AUTO_UPDATE': '1'}) }}"
  loop: "{{ brewfile_gui_casks.stdout_lines }}"
  loop_control:
    label: "{{ item }}"
  register: gui_cask_install
  changed_when: >-
    'Installing' in gui_cask_install.stdout or
    'Upgrading' in gui_cask_install.stdout or
    'installed' in gui_cask_install.stdout
  failed_when: false
  when: item | length > 0
  tags:
    - install
    - gui
    - productivity

- name: Report GUI cask failures
  ansible.builtin.debug:
    msg:
      - "Some GUI casks failed but setup will continue."
      - "{{ gui_cask_install.results | selectattr('rc', 'ne', 0) | map(attribute='item') | list }}"
  when: >-
    gui_cask_install is defined and
    (gui_cask_install.results | selectattr('rc', 'ne', 0) | list | length) > 0
  tags:
    - install
    - gui
    - productivity

