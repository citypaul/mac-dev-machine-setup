- name: Remove unwanted cli packages
  community.general.homebrew:
    name: "{{ item }}"
    state: absent
  environment: "{{ homebrew_environment }}"
  loop: "{{ cli_packages_to_remove_if_installed }}"
  tags:
    - install
    - core
    - remove
    - cli

- name: Remove unwanted packages
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: absent
    install_options: force
  environment: "{{ homebrew_environment }}"
  loop: "{{ gui_packages_to_remove_if_installed }}"
  tags:
    - install
    - core
    - remove
    - gui

- name: Remove unwanted gui packages from work machine
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: absent
    install_options: force
  environment: "{{ homebrew_environment }}"
  loop: "{{ gui_packages_to_remove_if_installed_work }}"
  tags:
    - work
    - work-remove
