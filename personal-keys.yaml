- hosts: localhost

  vars:
    source_ssh_key: "./.ssh/id_rsa"
    dest_ssh_key: "{{ lookup('env', 'HOME') }}/.ssh/id_rsa"
  tasks:
    - name: Ensure .ssh directory exists
      file:
        path: "{{ lookup('env', 'HOME') }}/.ssh"
        state: directory
        mode: "0700"
      ignore_errors: no

    - import_tasks: ansible/tasks/ssh.yaml

    - name: Set correct permissions for SSH key
      file:
        path: "{{ dest_ssh_key }}"
        mode: "0600"
      when: dest_ssh_key is file
      ignore_errors: no

    - name: Verify SSH key installation
      stat:
        path: "{{ dest_ssh_key }}"
      register: ssh_check
      failed_when: not ssh_check.stat.exists
